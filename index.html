<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attention Challenge — Think Like a Transformer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple: #7C3AED;
    --purple-light: #A78BFA;
    --purple-pale: #EDE9FE;
    --purple-dark: #3B0764;
    --blue: #0EA5E9;
    --green: #10B981;
    --amber: #F59E0B;
    --red: #E24B4A;
    --bg: #F8F7FF;
    --surface: #FFFFFF;
    --surface2: #F1EFF9;
    --border: rgba(124,58,237,0.15);
    --border2: rgba(124,58,237,0.3);
    --text: #1a1025;
    --text2: #6B5E82;
    --text3: #9B8DB5;
    --monitor-bg: #0d0b1a;
    --monitor-border: #2d1f5e;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
    max-width: 560px;
  }

  .header-badge {
    display: inline-block;
    background: var(--purple-pale);
    color: var(--purple);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 1rem;
  }

  header h1 {
    font-size: 32px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  header h1 span { color: var(--purple); }

  header p {
    font-size: 15px;
    color: var(--text2);
    line-height: 1.6;
  }

  .game-card {
    background: var(--surface);
    border-radius: 20px;
    border: 1px solid var(--border);
    padding: 2rem;
    width: 100%;
    max-width: 620px;
  }

  /* Progress */
  .pip-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 1.75rem;
  }
  .pip {
    flex: 1;
    height: 5px;
    border-radius: 3px;
    background: var(--surface2);
    transition: background .4s;
  }
  .pip.done { background: var(--purple); }
  .pip.active { background: var(--purple-light); }
  .pip-label {
    font-size: 12px;
    color: var(--text3);
    margin-left: 8px;
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
  }

  /* Full sentence */
  .full-sentence {
    background: var(--surface2);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 10px;
    font-size: 19px;
    line-height: 1.6;
    color: var(--text);
  }
  .full-sentence .tgt {
    color: var(--purple);
    font-weight: 600;
    border-bottom: 2px solid var(--purple-light);
    padding-bottom: 1px;
  }

  /* Word chips */
  .word-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 1.25rem;
  }
  .word-card-meta {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 10px;
    font-family: 'DM Mono', monospace;
  }
  .words-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .word-chip {
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: 2px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    transition: all .18s;
    user-select: none;
    font-family: 'DM Sans', sans-serif;
  }
  .word-chip:hover { border-color: var(--purple-light); transform: translateY(-2px); }
  .word-chip.target { background: var(--purple-pale); color: var(--purple-dark); border-color: var(--purple-light); cursor: default; }
  .word-chip.selected { background: var(--purple); color: #fff; border-color: var(--purple); transform: translateY(-2px); }
  .word-chip.disabled { opacity: .35; cursor: not-allowed; transform: none; pointer-events: none; }

  /* Middle layout */
  .middle-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 1.25rem;
    align-items: start;
  }

  /* Computer */
  .computer-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .monitor {
    width: 118px;
    background: var(--monitor-bg);
    border-radius: 10px;
    padding: 8px;
    border: 2px solid var(--monitor-border);
  }
  .monitor-screen {
    background: #06040f;
    border-radius: 5px;
    padding: 8px 7px;
    height: 58px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 5px;
  }
  .scanline {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 30px;
    background: rgba(167,139,250,0.04);
    animation: scanline 3s linear infinite;
    pointer-events: none;
  }
  .sline {
    font-size: 8px;
    font-family: 'DM Mono', monospace;
    color: #3d2d6b;
    letter-spacing: .03em;
    position: relative;
    z-index: 1;
  }
  .sline.bright { color: #A78BFA; }
  .cursor {
    display: inline-block;
    width: 4px;
    height: 8px;
    background: var(--purple-light);
    animation: blink 1s step-end infinite;
    vertical-align: middle;
    margin-left: 1px;
  }
  .monitor-chin { height: 5px; background: #0a0818; border-radius: 0 0 4px 4px; margin: 4px 4px 0; }
  .monitor-base { width: 36px; height: 5px; background: var(--monitor-bg); border-radius: 0 0 3px 3px; margin: 0 auto; }
  .monitor-stand { width: 16px; height: 7px; background: var(--monitor-bg); margin: 0 auto; }
  .monitor-label {
    font-size: 10px;
    color: var(--text3);
    margin-top: 5px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    letter-spacing: .06em;
  }

  /* Bubble connector */
  .bubble-conn { width: 2px; height: 12px; background: var(--border2); margin: 0 auto; }
  .bubble-dot { border-radius: 50%; background: var(--purple-pale); border: 2px solid var(--purple-light); margin: 2px auto; }

  /* Thought bubble */
  .bubble {
    background: var(--surface);
    border: 2px dashed var(--purple-light);
    border-radius: 50%;
    width: 168px;
    height: 134px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 12px;
    animation: float 3s ease-in-out infinite;
    transition: border-color .3s, border-style .3s;
  }
  .bubble.full { border-style: solid; border-color: var(--purple); animation: glowbubble 1.5s ease-in-out infinite; }
  .bubble-slot {
    width: 126px;
    height: 27px;
    border-radius: 14px;
    border: 1.5px dashed rgba(124,58,237,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--text3);
    transition: all .2s;
    cursor: default;
  }
  .bubble-slot.filled {
    background: var(--purple);
    border-color: var(--purple);
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    animation: popIn .2s ease;
  }
  .bubble-slot.filled:hover { background: #6D28D9; }
  .rank-badge { font-size: 9px; font-weight: 600; margin-right: 4px; opacity: .8; }
  .bubble-hint { font-size: 11px; color: var(--text3); margin-top: 5px; text-align: center; }

  /* Scoring strip */
  .scoring-strip { display: flex; flex-direction: column; justify-content: center; gap: 10px; padding: 8px; }
  .scoring-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; font-family: 'DM Mono', monospace; margin-bottom: 2px; }
  .score-row { display: flex; align-items: center; gap: 10px; }
  .srank {
    width: 36px; height: 24px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
  }
  .spts { font-size: 14px; font-weight: 500; color: var(--text); }
  .spts-sub { font-size: 11px; color: var(--text3); }
  .scoring-footnote { font-size: 10px; color: var(--text3); margin-top: 4px; font-family: 'DM Mono', monospace; }

  /* Submit button */
  .submit-btn {
    width: 100%;
    padding: 13px;
    border-radius: 22px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: var(--purple);
    color: #fff;
    transition: all .15s;
    margin-bottom: 1rem;
    font-family: 'DM Sans', sans-serif;
  }
  .submit-btn:hover { background: #6D28D9; transform: translateY(-1px); }
  .submit-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; }

  /* Reveal panel */
  .reveal-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    animation: fadeUp .35s ease;
    margin-bottom: 1rem;
  }
  .reveal-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 12px; }
  .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .col-title { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; font-family: 'DM Mono', monospace; margin-bottom: 8px; }
  .cmp-item { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  .crank { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; }
  .cword { font-size: 14px; font-weight: 500; color: var(--text); }
  .cpts { font-size: 11px; margin-left: auto; font-weight: 600; }

  .score-bar-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .sb-label { font-size: 12px; color: var(--text2); width: 80px; }
  .sb-track { flex: 1; height: 12px; background: var(--surface2); border-radius: 6px; overflow: hidden; }
  .sb-fill { height: 100%; border-radius: 6px; animation: revealBar .6s ease; }
  .sb-num { font-size: 13px; font-weight: 600; width: 44px; text-align: right; }

  .insight-box {
    background: var(--purple-pale);
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 13px;
    color: var(--purple-dark);
    line-height: 1.65;
    margin-top: 10px;
  }
  .insight-why { font-size: 11px; opacity: .75; margin-top: 4px; display: block; }

  .next-btn {
    width: 100%;
    padding: 12px;
    border-radius: 22px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid var(--purple);
    background: transparent;
    color: var(--purple);
    transition: all .15s;
    font-family: 'DM Sans', sans-serif;
  }
  .next-btn:hover { background: var(--purple-pale); }

  /* Final screen */
  .final-screen { text-align: center; padding: 1rem 0; animation: fadeUp .4s ease; }
  .final-total-label { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
  .final-score { font-size: 56px; font-weight: 600; color: var(--purple); line-height: 1; margin: 4px 0; }
  .final-denom { font-size: 24px; color: var(--text3); font-weight: 400; }
  .final-grade { font-size: 20px; font-weight: 500; margin: 8px 0 1.5rem; }
  .breakdown-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin: 0 0 1.25rem; }
  .bk-card { background: var(--surface2); border-radius: 12px; padding: 12px 8px; text-align: center; }
  .bk-num { font-size: 22px; font-weight: 600; color: var(--purple); }
  .bk-label { font-size: 11px; color: var(--text3); margin-top: 3px; font-family: 'DM Mono', monospace; }
  .final-lesson { font-size: 14px; color: var(--text2); line-height: 1.65; max-width: 420px; margin: 0 auto 1.5rem; }
  .replay-btn {
    padding: 12px 32px;
    border-radius: 22px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid var(--purple);
    background: var(--purple);
    color: #fff;
    transition: all .15s;
    font-family: 'DM Sans', sans-serif;
  }
  .replay-btn:hover { background: #6D28D9; }

  /* Animations */
  @keyframes popIn { 0%{transform:scale(0.6);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  @keyframes revealBar { from{width:0} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  @keyframes glowbubble { 0%,100%{border-color:#A78BFA} 50%{border-color:#7C3AED} }
  @keyframes blink { 0%,100%{opacity:1} 45%,55%{opacity:0} }
  @keyframes scanline { 0%{transform:translateY(-100%)} 100%{transform:translateY(600%)} }
</style>
</head>
<body>

<header>
  <div class="header-badge">NLP Interactive</div>
  <h1>The <span>Attention</span> Challenge</h1>
  <p>The same word, three different meanings. Can you think like a transformer and spot the right context clues?</p>
</header>

<div class="game-card">
  <div class="pip-row" id="pip-row"></div>
  <div id="main-content"></div>
</div>

<script>
const ROUNDS = [
  {
    sentence: ["What","an","admirable","role","model","she","is"],
    target: "model",
    answer: [
      {word:"admirable", pts:50, why:"signals something praiseworthy — a role model is someone to look up to"},
      {word:"role",       pts:30, why:"\"role model\" is the key compound phrase here"},
      {word:"she",        pts:20, why:"confirms this is a person, not a concept or object"}
    ],
    insight: "\"admirable\" + \"role\" together lock in the meaning of model as a person to emulate."
  },
  {
    sentence: ["I","learned","a","lot","about","this","machine","learning","model"],
    target: "model",
    answer: [
      {word:"machine",  pts:50, why:"\"machine learning\" is the technical domain — model means algorithm here"},
      {word:"learning", pts:30, why:"together with \"machine\", signals an AI/statistical context"},
      {word:"learned",  pts:20, why:"study context reinforces a technical/academic meaning"}
    ],
    insight: "\"machine\" + \"learning\" instantly tell a transformer this is an AI model, not a person."
  },
  {
    sentence: ["The","fashion","model","walked","down","the","runway"],
    target: "model",
    answer: [
      {word:"fashion", pts:50, why:"\"fashion\" is the single strongest signal — it defines the entire domain"},
      {word:"runway",  pts:30, why:"runways belong to fashion shows, cementing the meaning"},
      {word:"walked",  pts:20, why:"models walk — action verb consistent with the fashion world"}
    ],
    insight: "\"fashion\" alone nearly decides it, and \"runway\" seals the deal. Same word, completely different meaning!"
  }
];

const RANK_COLORS = ["#7C3AED","#0EA5E9","#10B981"];
const RANK_LABELS = ["1st","2nd","3rd"];
const RANK_PTS    = [50, 30, 20];

let round = 0, selections = [], roundScores = [], revealed = false;

function buildPips() {
  document.getElementById('pip-row').innerHTML =
    ROUNDS.map((_,i) => `<div class="pip ${i<round?'done':i===round?'active':''}"></div>`).join('') +
    `<span class="pip-label">Round ${round+1} / ${ROUNDS.length}</span>`;
}

function selectable(r) { return r.sentence.filter(w => w !== r.target); }

function fullSentenceHTML(r) {
  return r.sentence.map(w => w === r.target ? `<span class="tgt">${w}</span>` : w).join(' ');
}

function monitorHTML() {
  return `<div class="computer-wrap">
    <div class="monitor">
      <div class="monitor-screen">
        <div class="scanline"></div>
        <div class="sline bright">&gt; reading context<span class="cursor"></span></div>
        <div class="sline">token: "model"</div>
        <div class="sline bright">attn weights: ?</div>
      </div>
      <div class="monitor-chin"></div>
    </div>
    <div class="monitor-base"></div>
    <div class="monitor-stand"></div>
    <div class="monitor-label">transformer</div>
    <div class="bubble-conn"></div>
    <div class="bubble-dot" style="width:9px;height:9px;"></div>
    <div class="bubble-dot" style="width:6px;height:6px;"></div>
  </div>`;
}

function renderRound() {
  revealed = false; selections = [];
  const r = ROUNDS[round];
  const wordsHtml = r.sentence.map(w =>
    w === r.target
      ? `<span class="word-chip target">${w}</span>`
      : `<span class="word-chip" id="sw-${w}" onclick="toggleWord('${w}')">${w}</span>`
  ).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="full-sentence">${fullSentenceHTML(r)}</div>
    <div class="word-card">
      <div class="word-card-meta">Tap words that explain what "model" means here</div>
      <div class="words-row">${wordsHtml}</div>
    </div>
    <div class="middle-row">
      <div style="display:flex;flex-direction:column;align-items:center;">
        ${monitorHTML()}
        <div class="bubble" id="thought-bubble">
          <div class="bubble-slot" id="slot-0" onclick="removeWord(0)"><span>1st most important</span></div>
          <div class="bubble-slot" id="slot-1" onclick="removeWord(1)"><span>2nd most important</span></div>
          <div class="bubble-slot" id="slot-2" onclick="removeWord(2)"><span>3rd most important</span></div>
        </div>
        <p class="bubble-hint">Tap words to fill the thought bubble</p>
      </div>
      <div class="scoring-strip">
        <div class="scoring-title">Points per slot</div>
        ${RANK_LABELS.map((l,i) => `
          <div class="score-row">
            <div class="srank" style="background:${RANK_COLORS[i]}22;color:${RANK_COLORS[i]};">${l}</div>
            <span class="spts">${RANK_PTS[i]} pts</span>
            <span class="spts-sub">/ ${Math.round(RANK_PTS[i]/2)} pts</span>
          </div>`).join('')}
        <div class="scoring-footnote">full / partial credit</div>
      </div>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitRound()" disabled>Fill all 3 slots to submit</button>
    <div id="reveal-area"></div>
  `;
}

function toggleWord(w) {
  if (revealed) return;
  const idx = selections.indexOf(w);
  if (idx > -1) selections.splice(idx, 1);
  else {
    if (selections.length >= 3) { shakeBubble(); return; }
    selections.push(w);
  }
  updateStates(); updateBubble();
}

function removeWord(i) {
  if (revealed || selections[i] === undefined) return;
  selections.splice(i, 1);
  updateStates(); updateBubble();
}

function shakeBubble() {
  const b = document.getElementById('thought-bubble');
  b.style.animation = 'shake .3s ease';
  setTimeout(() => { b.style.animation = 'float 3s ease-in-out infinite'; }, 350);
}

function updateStates() {
  selectable(ROUNDS[round]).forEach(w => {
    const el = document.getElementById(`sw-${w}`);
    if (el) el.className = 'word-chip' + (selections.includes(w) ? ' selected' : '');
  });
  const btn = document.getElementById('submit-btn');
  if (btn) {
    btn.disabled = selections.length < 3;
    btn.textContent = selections.length < 3
      ? `Fill all 3 slots to submit (${selections.length}/3)`
      : 'Submit my attention';
  }
}

function updateBubble() {
  [0,1,2].forEach(i => {
    const slot = document.getElementById(`slot-${i}`);
    if (!slot) return;
    if (selections[i]) {
      slot.className = 'bubble-slot filled';
      slot.innerHTML = `<span class="rank-badge">${RANK_LABELS[i]}</span>${selections[i]}`;
    } else {
      slot.className = 'bubble-slot';
      slot.innerHTML = `<span>${i===0?'1st':i===1?'2nd':'3rd'} most important</span>`;
    }
  });
  const b = document.getElementById('thought-bubble');
  if (b) b.className = 'bubble' + (selections.length === 3 ? ' full' : '');
}

function calcScore() {
  const r = ROUNDS[round];
  const itemScores = r.answer.map((ans, ci) => {
    const si = selections.indexOf(ans.word);
    if (si === -1) return {word:ans.word, pts:ans.pts, earned:0, status:'miss'};
    if (si === ci)  return {word:ans.word, pts:ans.pts, earned:ans.pts, status:'perfect'};
    return {word:ans.word, pts:ans.pts, earned:Math.round(ans.pts/2), status:'partial'};
  });
  return { total: itemScores.reduce((a,s) => a+s.earned, 0), itemScores };
}

function submitRound() {
  revealed = true;
  selectable(ROUNDS[round]).forEach(w => {
    const el = document.getElementById(`sw-${w}`);
    if (el) el.classList.add('disabled');
  });
  document.getElementById('submit-btn').style.display = 'none';

  const { total, itemScores } = calcScore();
  roundScores.push(total);
  const r = ROUNDS[round];
  const isLast = round === ROUNDS.length - 1;
  const barColor = total >= 70 ? '#10B981' : total >= 40 ? '#F59E0B' : '#E24B4A';

  const studentCol = selections.map((w,i) => {
    const match = itemScores.find(s => s.word === w);
    const earned = match ? match.earned : 0;
    const status = match ? match.status : 'miss';
    const col = status==='perfect'?'#10B981':status==='partial'?'#F59E0B':'#E24B4A';
    return `<div class="cmp-item">
      <div class="crank" style="background:${RANK_COLORS[i]}22;color:${RANK_COLORS[i]};">${RANK_LABELS[i]}</div>
      <span class="cword">${w}</span>
      <span class="cpts" style="color:${col};">+${earned}</span>
    </div>`;
  }).join('');

  const txCol = r.answer.map((ans,i) =>
    `<div class="cmp-item">
      <div class="crank" style="background:${RANK_COLORS[i]}22;color:${RANK_COLORS[i]};">${RANK_LABELS[i]}</div>
      <span class="cword">${ans.word}</span>
      <span style="font-size:11px;color:var(--text3);margin-left:auto;">${ans.pts}pts</span>
    </div>`
  ).join('');

  document.getElementById('reveal-area').innerHTML = `
    <div class="reveal-panel">
      <div class="reveal-title">Round ${round+1} — ${total}/100 pts</div>
      <div class="compare-grid">
        <div><div class="col-title" style="color:#7C3AED;">Your attention</div>${studentCol}</div>
        <div><div class="col-title" style="color:#0EA5E9;">Transformer's attention</div>${txCol}</div>
      </div>
      <div class="score-bar-row">
        <span class="sb-label">Your score</span>
        <div class="sb-track"><div class="sb-fill" style="width:${total}%;background:${barColor};"></div></div>
        <span class="sb-num" style="color:${barColor};">${total}%</span>
      </div>
      <div class="insight-box">
        ${r.insight}
        <span class="insight-why">Why the top pick: ${r.answer[0].why}</span>
      </div>
    </div>
    <button class="next-btn" onclick="${isLast?'showFinal()':'nextRound()'}">${isLast?'See my final score →':'Next round →'}</button>
  `;
}

function nextRound() { round++; buildPips(); renderRound(); }

function showFinal() {
  const total = roundScores.reduce((a,b) => a+b, 0);
  const pct   = Math.round(total/300*100);
  const grade = pct>=90?'S':pct>=75?'A':pct>=60?'B':pct>=45?'C':'D';
  const gradeColor = pct>=75?'#10B981':pct>=50?'#F59E0B':'#E24B4A';
  const gradeMsg = pct>=90?'You think like a transformer!':pct>=75?'Sharp attention — nice work!':pct>=60?'Solid! Context is clicking.':pct>=45?'Getting there — context is tricky!':'Keep practicing — it clicks!';
  const best = roundScores.indexOf(Math.max(...roundScores));
  const roundNames = ["Role model","ML model","Fashion model"];

  document.getElementById('pip-row').innerHTML =
    ROUNDS.map(() => `<div class="pip done"></div>`).join('') +
    `<span class="pip-label">Complete!</span>`;

  document.getElementById('main-content').innerHTML = `
    <div class="final-screen">
      <div class="final-total-label">Total attention score</div>
      <div class="final-score">${total}<span class="final-denom">/300</span></div>
      <div class="final-grade" style="color:${gradeColor};">Grade ${grade} — ${gradeMsg}</div>
      <div class="breakdown-grid">
        ${roundScores.map((s,i) => `
          <div class="bk-card">
            <div class="bk-num">${s}</div>
            <div class="bk-label">${roundNames[i]}</div>
          </div>`).join('')}
      </div>
      <p class="final-lesson">
        "model" appeared in all 3 sentences — but the transformer paid attention to completely different words each time. <strong>Context is everything.</strong>
        That's the magic of the attention mechanism.
      </p>
      <button class="replay-btn" onclick="restartGame()">Play again</button>
    </div>
  `;
}

function restartGame() {
  round = 0; selections = []; roundScores = []; revealed = false;
  buildPips(); renderRound();
}

buildPips();
renderRound();
</script>
</body>
</html>
